<!DOCTYPE html>
<html>
<head>
    <title>Smart Student Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }

        #dashboard {
            display: none;
        }

        ul {
            list-style: none;
        }
    </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="login" class="container">
    <h1>🔐 Login</h1>
    <input type="text" id="username" placeholder="Enter your name"><br>
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container">
    <h1>🚀 Smart Student Assistant</h1>
    <p id="welcome"></p>

    <h2>📋 Add Task</h2>
    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>

    <h2>🤖 AI Assistant</h2>
    <button onclick="ai()">Ask AI</button>
</div>

<script>
function login() {
    let name = document.getElementById("username").value;

    if (name === "") {
        alert("Please enter your name");
        return;
    }

    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("welcome").innerText = "Welcome, " + name + "!";
}

function addTask() {
    let task = document.getElementById("taskInput").value;

    if (task === "") return;

    let li = document.createElement("li");

    li.innerHTML = "✔ " + task + 
    " <button onclick='this.parentElement.remove()'>❌</button>";

    document.getElementById("taskList").appendChild(li);

    document.getElementById("taskInput").value = "";
}

function ai() {
    let input = prompt("What do you need help with?");

    if (!input) return;

    let response = "Start with your most important task first.";

    if (input.toLowerCase().includes("study")) {
        response = "Try 25 min focus + 5 min break (Pomodoro).";
    } else if (input.toLowerCase().includes("exam")) {
        response = "Revise key topics and practice questions.";
    }

    alert("AI Suggestion: " + response);
}
</script>

</body>
</html>
